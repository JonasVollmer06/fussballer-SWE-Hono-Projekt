# ==============================================================================
# S e r v e r , z.B. Bun, Node oder Deno
# ==============================================================================
#[server]
#port = 3000

# ==============================================================================
# D a t e n b a n k
# ==============================================================================
[db]
populate = true

# ==============================================================================
# M a i l s e r v e r
# ==============================================================================
[mail]
#activated = false
#host = "mail"
port = 1025
log = false
#from = '"Joe Doe" <Joe.Doe@acme.com>'
#to = '"Foo Bar" <Foo.Bar@acme.com>'

# ==============================================================================
# K e y c l o a k
# ==============================================================================
# Client-ID muss durch die Umgebungsvariable CLIENT_ID gesetzt werden
#[keycloak]
#schema = "http"
#host = "keycloak"
#port = 8080
#realm = "javascript"
# siehe Keycloak Menuepunkt "Clients" > Tab "Clients list" > Spalte "Client ID"
#clientId = "javascript-client"

# ==============================================================================
# L o g g i n g
# ==============================================================================
[log]
#dir = "/tmp"
# Auskommentieren fuer Lasttests
level = "debug"
pretty = true
