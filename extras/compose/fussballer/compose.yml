# Aufruf:   docker compose up
#           docker compose exec buch bash   # "ash" bei Alpine
#             id
#             env
#             pwd
#             ls -l dist
#             hostname
#             cat /etc/os-release
#             ps                            # NUR Alpine
#           docker compose down

# ash = Almquist shell
# https://en.wikipedia.org/wiki/Almquist_shell

# Alpine mit busybox: "one binary to rule them all"
# https://www.busybox.net

# https://docs.docker.com/compose/compose-file
# https://github.com/compose-spec/compose-spec/blob/master/schema/compose-spec.json

# https://docs.docker.com/reference/compose-file/include
# Der "service" fuer das DB-System muss fuer "depends_on" bekannt sein
include:
  - path: ../backend/compose.yml

# https://docs.docker.com/reference/compose-file/services
services:
  buch:
    image: juergenzimmermann/fussballer:2026.4.1-hardened
    #image: juergenzimmermann/buch:2026.4.1-trixie
    #image: juergenzimmermann/buch:2026.4.1-alpine
    #entrypoint:["/bin/bash", "-c", "echo 'Container als bash gestartet.' && sleep infinity"]
    # (d)ash = (Debian) Almquist Shell
    #entrypoint: ["/bin/ash", "-c", "echo 'Container als ash gestartet.' && sleep infinity"]

    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_healthy
      keycloak:
        condition: service_healthy

    ports:
      - published: 3000
        target: 3000
    volumes:
      - type: bind
        source: app.toml
        target: /opt/app/src/config/resources/app.toml
        read_only: true
      - type: bind
        source: ../../../log
        target: /tmp/log
        read_only: true
      - type: bind
        source: ../../../src/config/resources/tls/key.pem
        target: /opt/app/src/config/resources/tls/key.pem
        read_only: true
    networks: [acme-network]
    env_file: .env
    # generierter Rechnername, damit die Abfrage bzgl. Docker funktioniert
    #hostname: fussballer
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G

networks:
  acme-network:
    name: acme-network
