# Aufruf:   docker compose up
#             Prometheus: http://localhost:9090
#                         http_request_duration_seconds_bucket
#                         process_cpu_usage
#             Grafana:    http://localhost:3333
#                         11159
#             docker compose exec prometheus ash
#             docker compose exec grafana bash
#           docker compose down

# https://grafana.com/blog/2024/03/13/an-opentelemetry-backend-in-a-docker-image-introducing-grafana/otel-lgtm

services:
  prometheus:
    image: prom/prometheus:v3.11.3
    ports:
      - published: 9090
        target: 9090
    volumes:
      - type: bind
        source: ./prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
      - type: bind
        source: ./prometheus-data
        target: /prometheus
      - type: bind
        source: ../../../src/config/resources/tls/certificate.crt
        target: /etc/prometheus/certificate.crt
        read_only: true
      - type: bind
        source: ../../../src/config/resources/tls/key.pem
        target: /etc/prometheus/private-key.pem
        read_only: true
    networks: [acme-network]
    container_name: prometheus
    # https://docs.docker.com/reference/compose-file/services/#cap_drop
    # https://man7.org/linux/man-pages/man7/capabilities.7.html
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 512M

  grafana:
    image: grafana/grafana:13.0.1
    ports:
      - published: 3333
        target: 3000
    volumes:
      - type: bind
        source: ./grafana-datasources
        target: /etc/grafana/provisioning/datasources
        read_only: true
      - type: bind
        # SQLite-Datenbank mit z.B. der Tabelle "dashboard"
        source: ./grafana.db
        target: /var/lib/grafana/grafana.db
    environment:
      # https://grafana.com/docs/grafana/latest/setup-grafana/configure-security/configure-authentication/grafana
      # default: admin / admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      #- GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      #- GF_AUTH_DISABLE_LOGIN_FORM=true
    networks: [acme-network]
    #user: "grafana"
    container_name: grafana
    cap_drop: [ALL]
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  acme-network:
    name: acme-network
